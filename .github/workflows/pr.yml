name: PR checks

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate conventional-commit PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types must match the release rules in .releaserc.js. Hidden types (chore, refactor, etc.)
          # are still allowed so non-release work can land; only feat/fix/perf/build(deps) trigger version bumps.
          types: |
            feat
            fix
            perf
            docs
            ci
            build
            chore
            refactor
            test
            style
            revert
          requireScope: false

  validate:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check + ESLint
        run: npm run validate
